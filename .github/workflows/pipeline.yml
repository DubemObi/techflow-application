name: TechFlow CI Pipeline

on:
    push:
        branches:
            - main


jobs:
    unit-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: Install Dependencies
              run: npm install
            
            - name: Run Unit Tests
              run: npm test
            
    docker-build-and-push:
        needs: unit-tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME}}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Backup Current Image Tag
              run: |
                docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest || true
                docker tag \
                ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest \
                ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous || true

            - name: Push Previous Tag
              run: |
               docker push ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous || true

            - name: Build Docker Image
              run: |
                docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/techflow-api:latest .

            - name: Push Docker Image
              run: |
                docker push ${{ secrets.DOCKERHUB_USERNAME }}/techflow-api:latest



    deploy-to-ec2:
        needs: docker-build-and-push
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_SSH_KEY }}

                script: |
                    docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest
                    docker stop techflow-api || true
                    docker rm techflow-api || true

                    docker run -d \
                        --name techflow-api \
                        -p 3000:3000 \
                        ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:latest

                    sleep 15

                    docker exec techflow-api /app/scripts/health-check.sh

                    if [ $? -ne 0 ]; then
                        echo "Health check failed. Starting rollback..."
                        
                        docker stop techflow-api || true
                        docker rm techflow-api || true

                        docker pull ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous

                        docker run -d --name techflow-api -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME}}/techflow-api:previous

                        echo "Rollback Successful"
                    fi

                    echo "Deployment Successful"


    notify:
        needs: deploy-to-ec2
        runs-on: ubuntu-latest
        if: always()

        steps:
            - name: Set deploy status message
              id: status
              run: |
                if [ "${{ needs.deploy-to-ec2.result }}" == "success" ]; then
                echo "STATUS=✅ SUCCESS" >> $GITHUB_OUTPUT
                else
                echo "STATUS=❌ FAILED" >> $GITHUB_OUTPUT
                fi
            - name: Send Gmail notification
              uses: dawidd6/action-send-mail@v3
              with:
                server_address: smtp.gmail.com
                server_port: 465
                secure: true
                username: ${{ secrets.GMAIL_SENDER }}
                password: ${{ secrets.GMAIL_APP_PASSWORD }}
                to: ${{ secrets.NOTIFY_EMAIL }}
                from: TechFlow CI/CD <${{ secrets.GMAIL_SENDER }}>
                subject: "[${{ steps.status.outputs.STATUS }}] TechFlow Deploy - ${{ github.ref_name }}"
                html_body: |
                    <h2>🚀 TechFlow Deployment Report</h2>
                    <p><strong>Status:</strong> ${{ steps.status.outputs.STATUS }}</p>
                    <p><strong>Commit:</strong> ${{ github.sha }}</p>
                    <p><strong>Author:</strong> ${{ github.actor }}</p>
                    <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
                    <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                        View Pipeline Run
                    </a></p>